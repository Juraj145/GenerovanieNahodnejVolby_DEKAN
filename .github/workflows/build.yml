name: Build Windows EXE

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --onefile --windowed --name "VolbaPoradiaDekana" volba_poradia.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolbaPoradiaDekana
          path: dist/VolbaPoradiaDekana.exe

      - name: Publish to Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Najnovšia verzia (.exe)
          files: dist/VolbaPoradiaDekana.exe
