name: Build Windows EXE + Installer

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyinstaller certifi

      - name: Build EXE
        run: >
          python -m PyInstaller --noconfirm --onefile --windowed
          --icon app.ico --add-data "app.ico;."
          --name "VolbaPoradiaDekana" volba_poradia.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VolbaPoradiaDekana
          path: |
            dist/VolbaPoradiaDekana.exe
            installer_out/VolbaPoradiaDekana_Setup.exe

      - name: Publish to Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Najnovšia verzia
          files: |
            dist/VolbaPoradiaDekana.exe
            installer_out/VolbaPoradiaDekana_Setup.exe
