name: Build Windows EXE + Installer

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyinstaller certifi

      - name: Build EXE (onedir)
        run: >
          python -m PyInstaller --noconfirm --onedir --windowed
          --icon app.ico --add-data "app.ico;."
          --name "VolbaPoradiaDekana" volba_poradia.py

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist/VolbaPoradiaDekana" -DestinationPath "dist/VolbaPoradiaDekana_portable.zip" -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VolbaPoradiaDekana
          path: |
            dist/VolbaPoradiaDekana_portable.zip
            installer_out/VolbaPoradiaDekana_Setup.exe

      - name: Remove stale onefile asset
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete-asset latest VolbaPoradiaDekana.exe --yes -R ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Asset neexistuje alebo uz odstraneny" }
          exit 0

      - name: Publish to Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Najnovšia verzia
          files: |
            dist/VolbaPoradiaDekana_portable.zip
            installer_out/VolbaPoradiaDekana_Setup.exe
